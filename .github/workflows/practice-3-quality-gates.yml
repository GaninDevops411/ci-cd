name: Practice 3 - Testing and Quality Gates

on:
  push:
  workflow_dispatch:

jobs:

  flake8-lint:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Running Flake8..."
          echo "0 errors found"

  pylint-check:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Running Pylint..."
          echo "Score: 9.8/10"

  bandit-scan:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Running Bandit..."
          echo "No critical vulnerabilities"

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Executing unit tests..."
          echo "25 tests passed"

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Executing integration tests..."
          echo "12 tests passed"

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Executing E2E tests..."
          echo "8 tests passed"

  coverage-check:
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - integration-tests
      - e2e-tests

    steps:
      - run: |
          echo "Coverage: 92%"
          echo "Threshold 80% passed"

  quality-gate:
    runs-on: ubuntu-latest
    needs:
      - flake8-lint
      - pylint-check
      - bandit-scan
      - coverage-check

    steps:
      - run: |
          echo "Quality Gate Approved"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: quality-gate

    steps:
      - run: |
          echo "Deploying to staging"
