name: Practice 3 - Testing and Quality Gates

on:
  push:
    branches:
      - main
      - develop
      - feature-*
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  COVERAGE_THRESHOLD: "80"

jobs:
  quality-flake8:
    name: Flake8 Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -V
          pip install -r requirements.txt

      - name: Run flake8
        run: |
          flake8 app/ tests/ --max-line-length=120 --statistics --count

  quality-pylint:
    name: Pylint Check
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run pylint
        run: |
          pylint app/ --max-line-length=120 --disable=C0114,C0115,C0116

  security-bandit:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run bandit
        run: |
          bandit -r app/ -f json -o bandit-report.json
          bandit -r app/ -f screen

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 7

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/test_unit.py -v \
            --junitxml=report-unit.xml \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage-unit.xml

      - name: Upload unit reports
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            report-unit.xml
            coverage-unit.xml
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run integration tests
        run: |
          pytest tests/test_integration.py -v \
            --junitxml=report-integration.xml \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage-integration.xml

      - name: Upload integration reports
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: |
            report-integration.xml
            coverage-integration.xml
          retention-days: 7

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run e2e tests
        run: |
          pytest tests/test_e2e.py -v \
            --junitxml=report-e2e.xml \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage-e2e.xml

      - name: Upload e2e reports
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: |
            report-e2e.xml
            coverage-e2e.xml
          retention-days: 7

  coverage-check:
    name: Coverage Check 80%
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - integration-tests
      - e2e-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run all tests with coverage
        run: |
          pytest tests/ -v \
            --junitxml=report-all.xml \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-report=xml:coverage.xml

      - name: Check coverage threshold
        run: |
          coverage report --fail-under=${{ env.COVERAGE_THRESHOLD }}

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            report-all.xml
            coverage.xml
            htmlcov/
          retention-days: 7

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs:
      - quality-flake8
      - quality-pylint
      - security-bandit
      - coverage-check

    steps:
      - name: Quality gate passed
        run: |
          echo "=== QUALITY GATE REPORT ==="
          echo "Flake8: PASSED"
          echo "Pylint: CHECKED"
          echo "Bandit: CHECKED"
          echo "Coverage threshold: PASSED"
          echo "All quality gates passed!"

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.ref_name == 'main'

    environment:
      name: staging
      url: https://staging.example.com

    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          echo "All quality gates passed, deployment approved"
