name: Practice 4b - Environments and Deploy

on:
  push:
    branches:
      - main
      - develop
      - feature-*
      - hotfix/*
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  APP_VERSION: "1.0.0"

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build app
        run: |
          echo "Building application version $APP_VERSION"
          echo "Commit: $GITHUB_SHA"
          mkdir -p build
          echo "Build completed successfully" > build/build-info.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: build/
          retention-days: 7

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          echo "Running unit tests..."
          echo "All tests passed"

  deploy-dev:
    name: Auto Deploy DEV
    runs-on: ubuntu-latest
    needs: test

    if: github.ref_name != 'main' && !startsWith(github.ref, 'refs/tags/')

    environment:
      name: dev
      url: https://dev-myapp.example.com

    steps:
      - name: Deploy to DEV
        run: |
          echo "AUTO DEPLOY TO DEV"
          echo "Environment: dev"
          echo "Branch: $GITHUB_REF_NAME"
          echo "Version: $APP_VERSION"
          echo "Deploying..."
          sleep 2
          echo "Smoke tests passed"
          echo "DEV deployment completed"

  deploy-staging:
    name: Auto Deploy STAGING
    runs-on: ubuntu-latest
    needs: test

    if: github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/')

    environment:
      name: staging
      url: https://staging-myapp.example.com

    steps:
      - name: Pre-deployment checks
        run: |
          echo "Running pre-deployment checks..."
          echo "Tests status: PASSED"
          echo "Required variables: OK"
          echo "Database migrations: OK"

      - name: Deploy to STAGING
        run: |
          echo "AUTO DEPLOY TO STAGING"
          echo "Environment: staging"
          echo "Version: $APP_VERSION"
          echo "Deploying..."
          sleep 3
          echo "Staging deployment completed"

      - name: Post-deployment smoke tests
        run: |
          echo "Checking /health endpoint..."
          echo "Health check: PASSED"
          echo "API endpoints: OK"
          echo "Smoke tests passed"

  deploy-hotfix:
    name: Deploy HOTFIX
    runs-on: ubuntu-latest
    needs: test

    if: startsWith(github.ref_name, 'hotfix/')

    environment:
      name: staging-hotfix
      url: https://staging-hotfix-myapp.example.com

    steps:
      - name: Deploy hotfix
        run: |
          echo "HOTFIX deployment"
          echo "Branch: $GITHUB_REF_NAME"
          echo "Deploying urgent fix to staging-hotfix"
          sleep 2
          echo "Hotfix deployment completed"

  approve-production:
    name: Production Approval Gate
    runs-on: ubuntu-latest
    needs: deploy-staging

    if: github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/')

    environment:
      name: production-approval

    steps:
      - name: Approval information
        run: |
          echo "PRODUCTION DEPLOYMENT APPROVAL REQUIRED"
          echo "Verify before production:"
          echo "1. All tests passed"
          echo "2. Staging tested"
          echo "3. Team ready"
          echo "4. Rollback plan prepared"

  pre-deploy-production:
    name: Production Pre-Deploy Checks
    runs-on: ubuntu-latest
    needs: approve-production

    if: github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Comprehensive checks
        run: |
          echo "COMPREHENSIVE PRE-DEPLOYMENT CHECKS"
          echo "Environment variables: OK"
          echo "Build artifacts: OK"
          echo "Database connectivity: OK"
          echo "External services: OK"
          echo "SSL certificates: OK"
          echo "Infrastructure resources: OK"
          echo "Monitoring systems: OK"
          echo "Backup status: OK"
          echo "All checks passed"

  deploy-production:
    name: Manual Deploy PRODUCTION
    runs-on: ubuntu-latest
    needs: pre-deploy-production

    if: github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/')

    environment:
      name: production
      url: https://www.myapp.example.com

    steps:
      - name: Deploy to PRODUCTION
        run: |
          echo "MANUAL PRODUCTION DEPLOYMENT"
          echo "Environment: production"
          echo "Version: $APP_VERSION"
          echo "Commit: $GITHUB_SHA"
          echo "Deploying to production..."
          sleep 5
          echo "Production deployment completed"

      - name: Production smoke tests
        run: |
          echo "Running production smoke tests..."
          echo "Application availability: OK"
          echo "Health endpoint: healthy"
          echo "Core functionality: OK"
          echo "Response time: OK"
          echo "All smoke tests passed"
